<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Scale body -->
  <rect x="16" y="100" width="224" height="140" rx="36" fill="#1565C0"/>

  <!-- Top surface / glass panel -->
  <rect x="16" y="88" width="224" height="48" rx="28" fill="#42A5F5"/>

  <!-- Subtle highlight on glass -->
  <rect x="32" y="92" width="192" height="18" rx="12" fill="#90CAF9" opacity="0.45"/>

  <!-- Display bezel -->
  <rect x="56" y="150" width="144" height="68" rx="12" fill="#0D2B6E"/>

  <!-- Display screen glow -->
  <rect x="62" y="156" width="132" height="56" rx="8" fill="#0A3080"/>

  <!-- Weight readout -->
  <text
    x="128" y="196"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="38"
    font-weight="bold"
    letter-spacing="2"
    fill="#81D4FA">75.0</text>

  <!-- "kg" unit label -->
  <text
    x="200" y="215"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="16"
    fill="#4FC3F7">kg</text>

  <!-- Bluetooth symbol (top-left of display) -->
  <g transform="translate(70, 162) scale(0.9)" fill="#4FC3F7" opacity="0.85">
    <!-- BT vertical bar -->
    <line x1="8" y1="2" x2="8" y2="30" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round"/>
    <!-- BT top-right diagonal -->
    <line x1="8" y1="2"  x2="16" y2="9"  stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="16" y1="9" x2="8" y2="16"  stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round"/>
    <!-- BT bottom-right diagonal -->
    <line x1="8" y1="16" x2="16" y2="23" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="16" y1="23" x2="8" y2="30" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Scale feet -->
  <rect x="44"  y="226" width="44" height="14" rx="7" fill="#0D47A1"/>
  <rect x="168" y="226" width="44" height="14" rx="7" fill="#0D47A1"/>
</svg>
