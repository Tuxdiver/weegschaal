<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- White border frame -->
  <rect x="4" y="4" width="248" height="248" rx="28" fill="#E0E0E0"/>

  <!-- Black glass body -->
  <rect x="10" y="10" width="236" height="236" rx="24" fill="#111111"/>

  <!-- Subtle glass gloss top-left reflection -->
  <ellipse cx="80" cy="60" rx="52" ry="24" fill="#ffffff" opacity="0.04" transform="rotate(-20 80 60)"/>

  <!-- Left electrode strip (silver brushed) -->
  <rect x="36" y="72" width="38" height="164" rx="8" fill="#8A8A8A"/>
  <rect x="38" y="72" width="10" height="164" rx="6" fill="#AAAAAA" opacity="0.5"/>

  <!-- Right electrode strip (silver brushed) -->
  <rect x="182" y="72" width="38" height="164" rx="8" fill="#8A8A8A"/>
  <rect x="184" y="72" width="10" height="164" rx="6" fill="#AAAAAA" opacity="0.5"/>

  <!-- LCD display bezel -->
  <rect x="84" y="28" width="88" height="60" rx="6" fill="#222222"/>

  <!-- LCD screen -->
  <rect x="88" y="32" width="80" height="52" rx="4" fill="#B8C8A8"/>

  <!-- LCD weight readout (seven-segment style) -->
  <text
    x="128" y="71"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="30"
    font-weight="bold"
    fill="#1A1A1A"
    letter-spacing="1">64.2</text>

  <!-- "kg" -->
  <text
    x="160" y="76"
    font-family="Arial, sans-serif"
    font-size="11"
    font-weight="bold"
    fill="#1A1A1A">kg</text>

  <!-- Bluetooth mark in display top-right -->
  <g transform="translate(154,36)" stroke="#1A1A1A" stroke-width="1.8" stroke-linecap="round" fill="none">
    <line x1="5" y1="2"  x2="5"  y2="16"/>
    <polyline points="5,2  10,6  5,9"/>
    <polyline points="5,9  10,13 5,16"/>
  </g>
</svg>
